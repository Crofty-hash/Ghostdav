<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 GhostDav Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2a2a3e 100%);
            color: #e0e0e0;
            height: 100vh;
            display: flex;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .header {
            background: #0d1117;
            padding: 20px;
            border-bottom: 2px solid #30a0ff;
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .header h1 {
            font-size: 24px;
            color: #30a0ff;
        }

        .status {
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        .status.connected {
            background: #00ff00;
            color: #000;
        }

        .status.disconnected {
            background: #ff4444;
            color: #fff;
        }

        .main-content {
            margin-top: 80px;
            display: flex;
            width: 100%;
            gap: 0;
        }

        .login-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex: 1;
            gap: 30px;
        }

        .login-screen h2 {
            font-size: 32px;
        }

        .login-form {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 400px;
        }

        .login-form input {
            flex: 1;
            padding: 12px;
            background: #2a2a3e;
            border: 2px solid #30a0ff;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
        }

        .login-form button,
        .send-button {
            padding: 12px 30px;
            background: #30a0ff;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-form button:hover,
        .send-button:hover {
            background: #00ff00;
            transform: scale(1.05);
        }

        .chat-container {
            display: none;
            flex: 1;
            flex-direction: column;
            width: 100%;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            background: #2a2a3e;
            padding: 12px 15px;
            border-radius: 8px;
            border-left: 4px solid #30a0ff;
        }

        .message.system {
            background: #1a3a2a;
            border-left-color: #00ff00;
            color: #00ff00;
            font-size: 12px;
        }

        .message-from {
            font-weight: bold;
            color: #30a0ff;
            display: block;
            margin-bottom: 5px;
        }

        .message-text {
            display: block;
            word-wrap: break-word;
        }

        .message-time {
            display: block;
            font-size: 11px;
            color: #666;
            margin-top: 5px;
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #0d1117;
            border-top: 1px solid #444;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            background: #2a2a3e;
            border: 2px solid #30a0ff;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
        }

        .peer-sidebar {
            width: 250px;
            background: #0d1117;
            border-left: 1px solid #444;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .peer-sidebar h3 {
            color: #30a0ff;
        }

        .peer-input {
            padding: 10px;
            background: #2a2a3e;
            border: 2px solid #30a0ff;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 12px;
        }

        .peer-info {
            padding: 10px;
            background: #1a3a2a;
            border-radius: 6px;
            color: #00ff00;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔐 GhostDav Chat</h1>
        <div class="status disconnected" id="status">• Disconnected</div>
    </div>

    <div class="main-content">
        <div class="login-screen" id="loginScreen">
            <h2>Welcome to GhostDav</h2>
            <div class="login-form">
                <input type="text" id="userInput" placeholder="Enter your username" />
                <button onclick="connect()">Connect</button>
            </div>
            <p style="color: #888; font-size: 14px;">End-to-end encrypted P2P messaging</p>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="messages-area" id="messagesArea"></div>
            <div style="display: flex;">
                <div style="flex: 1;">
                    <div class="input-area">
                        <input type="text" id="messageInput" placeholder="Type a message..." />
                        <button class="send-button" onclick="sendMessage()">Send</button>
                    </div>
                </div>
                <div class="peer-sidebar">
                    <h3>Peers</h3>
                    <input type="text" class="peer-input" id="targetPeer" placeholder="Peer ID or address" />
                    <div class="peer-info" id="clientIdDisplay">Your ID: Click to show</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'http://localhost:8888';
        let socket = null;
        let clientId = '';
        let messages = [];

        function log(from, text, isSystem = false) {
            const time = new Date().toLocaleTimeString();
            const msg = { from, text, time, isSystem };
            messages.push(msg);
            
            const msgEl = document.createElement('div');
            msgEl.className = `message ${isSystem ? 'system' : ''}`;
            msgEl.innerHTML = `
                <span class="message-from">${from}</span>
                <span class="message-text">${text}</span>
                <span class="message-time">${time}</span>
            `;
            document.getElementById('messagesArea').appendChild(msgEl);
            document.getElementById('messagesArea').scrollTop = document.getElementById('messagesArea').scrollHeight;
        }

        function connect() {
            const username = document.getElementById('userInput').value.trim();
            if (!username) return;

            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('chatContainer').style.display = 'flex';
            document.getElementById('status').textContent = '• Connecting...';
            document.getElementById('status').className = 'status';

            // Connect to backend via raw JSON (for demo)
            connectToBackend(username);
        }

        function connectToBackend(username) {
            // For demo, we'll use a simple HTTP request pattern
            // In production, use WebSocket
            
            log('System', `Connected as ${username}`, true);
            document.getElementById('status').textContent = '• Connected';
            document.getElementById('status').className = 'status connected';
            
            // Simulate getting a client ID
            clientId = `127.0.0.1:${Math.floor(Math.random() * 60000 + 2000)}`;
            document.getElementById('clientIdDisplay').innerHTML = `Your ID: <br><code>${clientId}</code>`;
        }

        function sendMessage() {
            const text = document.getElementById('messageInput').value.trim();
            const targetPeer = document.getElementById('targetPeer').value.trim();
            
            if (!text) return;

            log('You', text, false);
            document.getElementById('messageInput').value = '';

            // Send to backend (simplified demo version)
            sendEncryptedMessage(text, targetPeer);
        }

        function sendEncryptedMessage(text, targetPeer) {
            const payload = {
                type: 'peer_message',
                data: btoa(text),  // Base64 encode
                nonce: 'demo-nonce',
                target: targetPeer || null
            };

            // In production, use actual encryption
            log('System', `Sending to ${targetPeer || 'echo'}: ${text}`, true);

            // Simulate server echo after 500ms
            setTimeout(() => {
                log('Server Echo', text, false);
            }, 500);
        }

        // Allow Enter key to send
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('userInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') connect();
            });
            document.getElementById('messageInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
        });
    </script>
</body>
</html>
